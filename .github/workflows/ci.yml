name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/traceform"
          AUTH_SECRET: "ci-test-secret-for-build-only-not-for-production"
          AUTH_RESEND_KEY: "re_placeholder_not_used_at_buildtime"
          AUTH_EMAIL_FROM: "noreply@example.com"
